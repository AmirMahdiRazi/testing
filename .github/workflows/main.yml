name: "Build & Release"   # You can name it as you want
on:
  pull_request:
    branches:
      -main
  push:
    branches:
      - main
jobs:  # Telling what jobs we need to happen
  build:      # Specify the building name and machine
    runs-on: macos-latest # here we selected macos-latest to be able to get ios build
    steps:
	- name : Checkout
	  uses : actions/checkout@v4
	
	- name: Setup JDK
	  uses: actions/setup-java@v4
	  with:
		java-version: '17'
		distribution: 'zulu'


	- name: Setup Flutter
	  uses: subosito/flutter-action@v2
	  with:
		channel: 'stable'
		flutter-version: 3.44.0
	- name: Install dependencies
	  run : flutter pub get
	- name: Build APK
	  run: flutter build apk --debug --build-name=1.0.0 --build-number=1

